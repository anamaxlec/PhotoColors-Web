<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoColors-WEB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Manrope:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Outfit:wght@500;600;700;800&family=Nunito+Sans:wght@600;700;800&family=Montserrat:wght@600;700;800&family=IBM+Plex+Sans:wght@500;600;700&family=Noto+Sans+SC:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel controls">
      <h1>PhotoColors-WEB</h1>
    
      <label class="field upload-field">
        <span>上传照片</span>
        <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/heic,image/heif" />
      </label>

      <div class="group-title">文字内容</div>
      <label class="field">
        <span>地点</span>
        <input id="locationInput" type="text" placeholder="例如：Fuzhou" value="Fuzhou" />
      </label>

      <label class="field">
        <span>时间</span>
        <input id="timeInput" type="text" placeholder="例如：6:00 PM" value="6:00 PM" />
      </label>

      <div class="toggles">
        <label class="toggle-item"><input id="showLocationInput" type="checkbox" checked />显示地点</label>
        <label class="toggle-item"><input id="showTimeInput" type="checkbox" checked />显示时间</label>
      </div>

      <div class="group-title">字体与排版</div>
      <label class="field">
        <span>字体选择</span>
        <select id="fontFamilySelect">
          <option value="apple-cn" selected>原版接近·系统无衬线</option>
          <option value="pingfang-original">苹方紧凑版</option>
          <option value="pingfang-soft">苹方柔和版</option>
          <option value="noto-cn">Noto Sans SC</option>
          <option value="inter">Inter + 中文无衬线</option>
          <option value="jakarta">Plus Jakarta Sans + 中文无衬线</option>
          <option value="manrope">Manrope + 中文无衬线</option>
          <option value="outfit">Outfit + 中文无衬线</option>
          <option value="montserrat">Montserrat + 中文无衬线</option>
          <option value="nunito">Nunito Sans + 中文无衬线</option>
          <option value="ibm-plex">IBM Plex Sans + 中文无衬线</option>
        </select>
      </label>

      <label class="field slider-field">
        <span>地点字号 <strong id="locationScaleValue">1.00×</strong></span>
        <input id="locationScaleInput" type="range" min="0.6" max="1.8" step="0.01" value="1.00" />
      </label>

      <label class="field slider-field">
        <span>时间字号 <strong id="timeScaleValue">1.00×</strong></span>
        <input id="timeScaleInput" type="range" min="0.5" max="1.8" step="0.01" value="1.00" />
      </label>

      <label class="field slider-field">
        <span>地点与时间间距 <strong id="lineGapValue">1.00×</strong></span>
        <input id="lineGapInput" type="range" min="0.3" max="2.5" step="0.01" value="1.00" />
      </label>

      <div class="dual-fields">
        <label class="field compact-field">
          <span>字色风格</span>
          <select id="toneSelect">
            <option value="soft" selected>更柔和</option>
            <option value="elegant">淡雅</option>
            <option value="balanced">平衡</option>
            <option value="vivid">鲜明</option>
          </select>
        </label>

        <label class="field compact-field">
          <span>描边风格</span>
          <select id="outlineSelect">
            <option value="none">无描边</option>
            <option value="soft" selected>柔和描边</option>
            <option value="mist">轻雾柔化</option>
          </select>
        </label>
      </div>

      <div class="actions">
        <button id="autoColorBtn" type="button">重新取色</button>
        <button id="downloadBtn" type="button" disabled>导出PNG</button>
      </div>

      <div class="live-readout">
        <div><span>当前预览</span><strong id="liveTextPreview">Nyhavn, Copenhagen / 6:42 PM</strong></div>
      </div>

      <div class="color-grid">
        <div class="color-row">
          <div id="bgSwatch" class="swatch"></div>
          <div class="color-meta">
            <div>背景色</div>
            <strong id="bgHexValue">#000000</strong>
          </div>
        </div>
        <div class="color-row">
          <div id="textSwatch" class="swatch"></div>
          <div class="color-meta">
            <div>字体色</div>
            <strong id="textHexValue">#000000</strong>
          </div>
        </div>
      </div>

    </section>

    <section class="panel preview-panel">
      <div class="preview-toolbar">
        <span>实时预览</span>
        <span id="sizeInfo">未加载图片</span>
      </div>
      <div class="preview-wrap">
        <canvas id="previewCanvas"></canvas>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
